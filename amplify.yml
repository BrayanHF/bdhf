version: 1
frontend:
  phases:
    preBuild:
      commands:
        - 'npm ci --cache .npm --prefer-offline'
    build:
      commands:
        - 'npm run build'
  artifacts:
    baseDirectory: dist/portfolio/browser
    files:
      - '**/*'
  cache:
    paths:
      - '.npm/**/*'

customRules:
  - source: </^[^.]+$|\.(?!(css|js|svg|webp|ico|json|pdf|txt|xml)$)([^.]+$)/>
    target: /index.html
    status: '200'
