<section class="relative w-full overflow-hidden py-24 sm:py-32">

  <!-- Floating shapes -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="exp-float-shape absolute top-[10%] right-[12%] w-4 h-4 rounded-full bg-white opacity-40 blur-sm"></div>
    <div class="exp-float-shape absolute top-[30%] left-[8%] w-5 h-5 rounded bg-neutral-300 opacity-30 rotate-45"></div>
    <div class="exp-float-shape absolute top-[55%] right-[10%] w-3 h-3 rounded-full bg-neutral-500 opacity-50"></div>
    <div class="exp-float-shape absolute top-[75%] left-[15%] w-6 h-6 rounded-full bg-white opacity-25 blur-sm"></div>
    <div class="exp-float-shape absolute top-[85%] right-[20%] w-4 h-4 bg-neutral-300 opacity-30 -rotate-12"></div>
  </div>

  <!-- Gradient orbs -->
  <div
    class="absolute top-1/4 right-1/3 w-[400px] h-[400px] rounded-full bg-white opacity-[0.03] blur-3xl pointer-events-none"></div>
  <div
    class="absolute bottom-1/4 left-1/4 w-[350px] h-[350px] rounded-full bg-neutral-300 opacity-[0.03] blur-3xl pointer-events-none"></div>
  <div
    class="absolute top-2/3 right-1/5 w-[300px] h-[300px] rounded-full bg-neutral-500 opacity-[0.02] blur-3xl pointer-events-none"></div>

  <!-- Content -->
  <div class="exp-section-title relative z-10 max-w-4xl mx-auto px-6">

    <!-- Section header -->
    <div class="mb-16 text-center">
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold leading-tight">
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-400">
          Historia Laboral
        </span>
      </h2>
      <p class="mt-4 text-sm sm:text-base text-white/35 max-w-xl mx-auto leading-relaxed">
        Mi trayectoria profesional en el sector público, gestión de datos, soporte técnico y sistemas electorales.
      </p>
    </div>

    <!-- Experience cards -->
    <div class="space-y-14 sm:space-y-16">
      @for (exp of experiences; track $index) {
        <experience-card
          [company]="exp.company"
          [role]="exp.role"
          [periodStart]="exp.periodStart"
          [periodEnd]="exp.periodEnd"
          [description]="exp.description"
        />
      }
    </div>

  </div>

</section>
