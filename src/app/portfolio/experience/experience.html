<section class="relative w-full overflow-hidden py-24 sm:py-32">
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <floating-shape
      top="10%"
      right="12%"
      [size]="16"
      shape="circle"
      color="white"
      [opacity]="0.4"
      [blur]="4"
      [animDelay]="0"
    />
    <floating-shape
      top="30%"
      left="8%"
      [size]="20"
      shape="rounded"
      color="#d4d4d4"
      [opacity]="0.3"
      [rotation]="45"
      [animDelay]="0.5"
    />
    <floating-shape
      top="55%"
      right="10%"
      [size]="12"
      shape="circle"
      color="#737373"
      [opacity]="0.5"
      [animDelay]="1.0"
    />
    <floating-shape
      top="75%"
      left="15%"
      [size]="24"
      shape="circle"
      color="white"
      [opacity]="0.25"
      [blur]="4"
      [animDelay]="1.5"
    />
    <floating-shape
      top="85%"
      right="20%"
      [size]="16"
      shape="square"
      color="#d4d4d4"
      [opacity]="0.3"
      [rotation]="-12"
      [animDelay]="2.0"
    />
  </div>

  <gradient-orb top="25%" right="33.33%" [size]="400" color="white" [opacity]="0.03" />
  <gradient-orb bottom="25%" left="25%" [size]="350" color="#d4d4d4" [opacity]="0.03" />
  <gradient-orb top="66.66%" right="20%" [size]="300" color="#737373" [opacity]="0.02" />

  <div class="relative z-10 max-w-4xl mx-auto px-6">

    <div class="mb-16 text-center">
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold leading-tight">
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-400"
        >
          Experiencia Laboral
        </span>
      </h2>
    </div>


    <div class="space-y-18 sm:space-y-20">
      @for (exp of experiences; track $index; let isLast = $last) {
        <article class="relative pl-8 py-2 transition-all duration-500 group">
          <experience-card [experience]="exp" />
        </article>
      }
    </div>
  </div>
</section>
