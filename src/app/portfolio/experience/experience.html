<section class="relative w-full overflow-hidden py-24 sm:py-32">
  <floating-shapes [count]="5" [discreet]="false" />

  <gradient-orbs [count]="3" position="right" />

  <div class="relative z-10 max-w-4xl mx-auto px-6">

    <div class="mb-16 text-center">
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold leading-tight">
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-400"
        >
          Experiencia Laboral
        </span>
      </h2>
    </div>


    <div class="space-y-18 sm:space-y-20">
      @for (exp of experiences; track $index; let isLast = $last) {
        <article class="relative pl-8 py-2 transition-all duration-500 group">
          <experience-card [experience]="exp" />
        </article>
      }
    </div>
  </div>
</section>
