<section class="relative min-h-dvh w-full overflow-hidden flex items-center justify-center">


  <!-- Floating shapes -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="float-shape absolute top-[15%] left-[10%] w-4 h-4 rounded-full bg-white opacity-70 blur-sm"></div>
    <div class="float-shape absolute top-[25%] right-[15%] w-6 h-6 rounded bg-neutral-300 opacity-40 rotate-45"></div>
    <div class="float-shape absolute top-[50%] left-[5%] w-3 h-3 rounded-full bg-neutral-500 opacity-60"></div>
    <div class="float-shape absolute top-[60%] right-[8%] w-5 h-5 rounded bg-white opacity-30 -rotate-12"></div>
    <div class="float-shape absolute top-[80%] left-[20%] w-4 h-4 rounded-full bg-neutral-300 opacity-50"></div>
    <div class="float-shape absolute top-[10%] left-[50%] w-3 h-3 bg-neutral-500 opacity-40 rotate-12"></div>
    <div class="float-shape absolute top-[70%] right-[25%] w-7 h-7 rounded-full bg-white opacity-20 blur-md"></div>
  </div>

  <!-- Gradient orbs -->
  <div
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full bg-white opacity-[0.04] blur-3xl pointer-events-none"></div>
  <div
    class="absolute top-1/3 right-1/4 w-[300px] h-[300px] rounded-full bg-neutral-300 opacity-[0.03] blur-3xl pointer-events-none"></div>
  <div
    class="absolute bottom-1/4 left-1/4 w-[400px] h-[400px] rounded-full bg-neutral-500 opacity-[0.03] blur-3xl pointer-events-none"></div>


  <!-- Hero -->
  <div class="relative z-10 text-center px-6 max-w-4xl mx-auto">

    <!-- Available for work -->
    <div
      class="hero-status mb-8 inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-white/20 bg-white/5">
      <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span>
      <span class="text-xs tracking-widest uppercase text-white/80 font-mono">Disponible para trabajar</span>
    </div>

    <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold leading-tight mb-4">

      <span class="hero-title-line block">
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-400">
          Brayan Hernandez
        </span>
      </span>

      <span class="hero-title-line block mt-2">
        <span class="text-white text-2xl sm:text-3xl md:text-4xl lg:text-5xl">
          Ingeniero de Sistemas
        </span>
      </span>
    </h1>


    <p class="hero-description text-sm sm:text-base text-white/30 max-w-xl mx-auto mb-10 leading-relaxed">
      Creo experiencias digitales modernas con tecnologías web de vanguardia.
      Apasionado por el código limpio, las interfaces intuitivas y la innovación constante.
    </p>

    <div class="hero-buttons flex flex-wrap justify-center gap-4">

      <a href="#projects"
         class="group relative inline-flex items-center gap-2 px-8 py-3 rounded-full font-medium text-sm tracking-wider uppercase overflow-hidden transition-all duration-300">
           <span
             class="absolute inset-0 bg-gradient-to-r from-white to-neutral-300 opacity-90 group-hover:opacity-100 transition-opacity"></span>
         <span
           class="absolute inset-0 bg-gradient-to-r from-neutral-300 to-white opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span>
         <span class="relative z-10 text-neutral-950 font-semibold">Ver Proyectos</span>
      </a>

      <a href="#contact"
         class="group relative inline-flex items-center gap-2 px-8 py-3 rounded-full font-medium text-sm tracking-wider uppercase overflow-hidden border border-white/20 transition-all duration-300 hover:border-white/50">
        <span class="absolute inset-0 bg-white/0 group-hover:bg-white/5 transition-colors"></span>
        <span class="relative z-10 text-white/70 group-hover:text-white transition-colors">Contacto</span>
      </a>

    </div>


  </div>

  <div class="hero-scroll absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
    <div class="w-[1px] h-8 bg-gradient-to-b from-white/30 to-transparent"></div>
  </div>

</section>
