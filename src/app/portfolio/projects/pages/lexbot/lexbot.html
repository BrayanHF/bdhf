<div class="bg-black flex flex-col">
  <back-button />

  <project-title
    title="LexbBot"
    subtitle="Asistente legal con inteligencia artificial para simplificar trámites jurídicos en Colombia"
  />

  @defer (on viewport) {
  <project-carousel [images]="images" />
  } @placeholder {
  <div class="h-[500px] animate-pulse rounded-xl"></div>
  } @defer (on viewport) {
  <project-structure-img
    label="Flujo de comunicación entre componentes de LexBot"
    img="assets/images/projects/lexbot/LexBotApp.webp"
  />
  } @placeholder {
  <div class="h-[500px] animate-pulse rounded-xl"></div>
  } @defer (on viewport) {
  <project-about [about]="aboutProject" />
  } @placeholder {
  <div class="h-[500px] animate-pulse rounded-xl"></div>
  } @defer (on viewport) {
  <project-techs [techCategories]="techCategories" />
  } @placeholder {
  <div class="h-[500px] animate-pulse rounded-xl"></div>
  } @defer (on viewport) {
  <project-github [hrefs]="githubLinks" />
  } @placeholder {
  <div class="h-[500px] animate-pulse rounded-xl"></div>
  }
</div>
