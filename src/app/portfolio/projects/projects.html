<section class="relative w-full overflow-hidden py-24 sm:py-32">

  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <floating-shape top="12%" left="8%" [size]="16" shape="circle" color="white" [opacity]="0.4" [blur]="4"
                    [animDelay]="0" />
    <floating-shape top="25%" right="15%" [size]="20" shape="rounded" color="#d4d4d4" [opacity]="0.3" [rotation]="45"
                    [animDelay]="0.5" />
    <floating-shape top="55%" left="12%" [size]="12" shape="circle" color="#737373" [opacity]="0.5"
                    [animDelay]="1.0" />
    <floating-shape top="70%" right="8%" [size]="24" shape="circle" color="white" [opacity]="0.25" [blur]="4"
                    [animDelay]="1.5" />
    <floating-shape top="85%" left="20%" [size]="16" shape="square" color="#d4d4d4" [opacity]="0.3" [rotation]="-12"
                    [animDelay]="2.0" />
  </div>

  <gradient-orb top="25%" left="33.33%" [size]="400" color="white" [opacity]="0.03" />
  <gradient-orb bottom="25%" right="25%" [size]="350" color="#d4d4d4" [opacity]="0.03" />
  <gradient-orb top="66.66%" left="20%" [size]="300" color="#737373" [opacity]="0.02" />

  <div class="relative z-10 h-full flex flex-col justify-center">

    <div class="mb-16 text-center px-6">
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold leading-tight">
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-400">
            Proyectos
          </span>
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8 px-6 sm:px-12 lg:px-20 max-w-5xl mx-auto">
      @for (project of projects; track $index) {
        <project-card [project]="project" />
      }
    </div>

  </div>
</section>
