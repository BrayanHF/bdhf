<section class="relative w-full overflow-hidden py-24 sm:py-32">

  <floating-shapes [count]="5" [discreet]="false" />

  <gradient-orbs [count]="3" position="left" />

  <div class="relative z-10 h-full flex flex-col justify-center">

    <div class="mb-16 text-center px-6">
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold leading-tight">
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-400">
            Proyectos
          </span>
      </h2>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 sm:gap-8 px-6 sm:px-12 lg:px-20 max-w-5xl mx-auto">
      @for (project of projects; track $index) {
        <project-card [project]="project" />
      }
    </div>

  </div>
</section>
