<section class="relative w-full overflow-hidden">
  <div class="min-h-dvh">

    <!-- Floating shapes -->
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
      <div class="proj-float-shape absolute top-[12%] left-[8%] w-4 h-4 rounded-full bg-white opacity-40 blur-sm"></div>
      <div class="proj-float-shape absolute top-[25%] right-[15%] w-5 h-5 rounded bg-neutral-300 opacity-30 rotate-45"></div>
      <div class="proj-float-shape absolute top-[55%] left-[12%] w-3 h-3 rounded-full bg-neutral-500 opacity-50"></div>
      <div class="proj-float-shape absolute top-[70%] right-[8%] w-6 h-6 rounded-full bg-white opacity-25 blur-sm"></div>
      <div class="proj-float-shape absolute top-[85%] left-[20%] w-4 h-4 bg-neutral-300 opacity-30 -rotate-12"></div>
    </div>

    <!-- Gradient orbs -->
    <div
      class="absolute top-1/4 left-1/3 w-[400px] h-[400px] rounded-full bg-white opacity-[0.03] blur-3xl pointer-events-none"></div>
    <div
      class="absolute bottom-1/4 right-1/4 w-[350px] h-[350px] rounded-full bg-neutral-300 opacity-[0.03] blur-3xl pointer-events-none"></div>
    <div
      class="absolute top-2/3 left-1/5 w-[300px] h-[300px] rounded-full bg-neutral-500 opacity-[0.02] blur-3xl pointer-events-none"></div>

    <!-- Content -->
    <div class="relative z-10 h-full flex flex-col justify-center">


      <!-- Section header -->
      <div class="proj-section-title mb-16 text-center px-6">
        <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold leading-tight">
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-400">
            Proyectos
          </span>
        </h2>
        <p class="mt-4 text-sm sm:text-base text-white/35 max-w-xl mx-auto leading-relaxed">
          Software y sistemas que he desarrollado combinando buenas practicas, codigo limpio y tecnologias modernas.
        </p>
      </div>

      <!-- Cards -->
      <div class="flex flex-col md:flex-row gap-6 sm:gap-8 px-6 sm:px-12 lg:px-20 max-w-5xl mx-auto">
        @for (project of projects; track $index) {
          <project-card
            [title]="project.title"
            [category]="project.category"
            [description]="project.description"
            [techs]="project.techs"
          />
        }
      </div>


    </div>

  </div>
</section>
