<section class="relative w-full overflow-hidden py-24 sm:py-32">

  <floating-shapes [count]="10" />

  <gradient-orbs [count]="4" position="left" />

  <div class="relative z-10 max-w-6xl mx-auto px-6">

    <div class="stack-section-header mb-20 text-center">
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold leading-tight">
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-400">
          Stack Tecnológico
        </span>
      </h2>
    </div>

    <div class="space-y-20 sm:space-y-24">
      @for (category of categories; track category.title) {
        <div class="stack-category">

          <div class="flex items-center gap-4 mb-10">
            <div class="h-px flex-1 bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
            <h3 class="text-lg sm:text-xl font-semibold text-white/70 tracking-wider uppercase font-mono">
              {{ category.title }}
            </h3>
            <div class="h-px flex-1 bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
          </div>


          <div class="flex flex-wrap justify-center gap-4 sm:gap-5">
            @for (tech of category.techs; track $index) {
              <div class="w-[calc(50%-1rem)] sm:w-40 md:w-48">
                <tech-card [tech]="tech" [showDescription]="true" />
              </div>
            }
          </div>
        </div>
      }
    </div>

  </div>

</section>
