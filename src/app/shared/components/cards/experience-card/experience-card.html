
  <div
    class="absolute left-0 top-2 bottom-2 w-px bg-gradient-to-b from-white/60 via-neutral-300/30 to-transparent group-hover:from-white group-hover:via-neutral-300/60 transition-all duration-500"
  ></div>
  <div
    class="absolute left-[-4.5px] top-8 w-[10px] h-[10px] rounded-full bg-white/80 ring-2 ring-white/20 group-hover:bg-neutral-200 group-hover:shadow-[0_0_16px_var(--tw-shadow-color)] group-hover:shadow-white/30 transition-all duration-500"
  ></div>

  <div class="space-y-4">
    <h3 class="text-xl sm:text-2xl font-bold text-white tracking-tight leading-tight">
      {{ experience().company }}

    <div class="flex flex-wrap items-center gap-3">
      <span
        class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-white/10 text-white border border-white/20"

        <li class="flex items-start gap-3 text-sm sm:text-base text-white/80 leading-relaxed">

          <span>{{ item }}</span>

      }
    </ul>
