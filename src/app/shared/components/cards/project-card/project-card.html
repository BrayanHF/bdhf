<article
  [routerLink]="project().route"
  class="relative w-full h-full cursor-pointer rounded-2xl border border-neutral-800 bg-neutral-950/60 backdrop-blur-sm p-6 sm:p-8 transition-all duration-500 group hover:border-white/30 hover:bg-neutral-950/80 hover:shadow-[0_0_40px_var(--tw-shadow-color)] hover:shadow-white/10">
  <div class="flex flex-col h-full space-y-6">

    <div class="space-y-3">
      <span
        class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium tracking-wider uppercase bg-neutral-500/10 text-neutral-400 border border-neutral-500/20">
        {{ project().category }}
      </span>

      <h3 class="text-2xl sm:text-3xl font-bold text-white tracking-tight leading-tight bg-clip-text transition-all duration-500 group-hover:bg-gradient-to-r group-hover:from-white group-hover:via-neutral-200 group-hover:to-neutral-400">
        {{ project().title }}
      </h3>
    </div>

    <p class="text-sm sm:text-base text-white/40 leading-relaxed flex-1">
      {{ project().description }}
    </p>

    <div class="flex flex-wrap gap-2 pt-2">
      @for (tech of project().techs; track $index) {
        <tech-card [tech]="tech" />
      }
    </div>

    <div class="pt-2">
      <span class="inline-flex items-center gap-2 text-sm text-white/60 group-hover:text-white transition-colors duration-300">
        Ver proyecto
        <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
      </span>
    </div>

  </div>
</article>
