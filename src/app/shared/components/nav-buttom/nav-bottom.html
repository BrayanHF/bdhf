<nav class="nav">

  <div>

    @for (item of menuItems; track $index) {
      <div class="menu-item">
        <lucide-icon [img]="item.img"/>
        <label class="text-mist-50"> {{ item.label }}</label>
      </div>
    }

    <button
      class="z-10"
      (click)="toggleMenu()"
    >
      <lucide-icon [img]="menuIcon()" class="menu-icon"/>
    </button>

  </div>

</nav>
