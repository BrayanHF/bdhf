<section class="relative w-full px-4 sm:px-8 lg:px-16 pb-16 sm:pb-24 overflow-hidden">
  <floating-shapes [count]="6" [discreet]="true" />

  <div class="max-w-3xl mx-auto">
    <h2 class="text-3xl sm:text-4xl font-bold text-white mb-6 text-center">
      Sobre el proyecto
    </h2>
    <div class="space-y-4 text-white/90 leading-relaxed text-base md:text-lg">
      @for (abt of about(); track $index) {
        <p>{{ abt }}</p>
      }
    </div>
  </div>
</section>
