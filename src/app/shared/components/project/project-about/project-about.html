<section class="relative w-full px-4 sm:px-8 lg:px-16 pb-16 sm:pb-24 overflow-hidden">
  <floating-shape top="6%" left="3%" [size]="14" shape="circle" color="white" [opacity]="0.15" [blur]="6" [animRange]="10" [animRotationRange]="8" [animDurationMin]="6" [animDurationMax]="10" />
  <floating-shape top="22%" right="4%" [size]="10" shape="rounded" color="#737373" [opacity]="0.1" [rotation]="-20" [animRange]="8" [animRotationRange]="6" [animDurationMin]="7" [animDurationMax]="12" [animDelay]="0.6" />
  <floating-shape top="45%" left="5%" [size]="8" shape="square" color="#d4d4d4" [opacity]="0.1" [rotation]="35" [animRange]="6" [animRotationRange]="5" [animDurationMin]="8" [animDurationMax]="14" [animDelay]="1.2" />
  <floating-shape top="65%" right="3%" [size]="12" shape="circle" color="white" [opacity]="0.12" [blur]="5" [animRange]="9" [animRotationRange]="7" [animDurationMin]="6" [animDurationMax]="11" [animDelay]="2" />
  <floating-shape bottom="8%" left="4%" [size]="10" shape="rounded" color="#737373" [opacity]="0.1" [rotation]="15" [animRange]="7" [animRotationRange]="6" [animDurationMin]="7" [animDurationMax]="13" [animDelay]="1.8" />
  <floating-shape bottom="18%" right="5%" [size]="9" shape="circle" color="#d4d4d4" [opacity]="0.1" [blur]="4" [animRange]="6" [animRotationRange]="5" [animDurationMin]="8" [animDurationMax]="12" [animDelay]="2.5" />

  <div class="max-w-3xl mx-auto">
    <h2 class="text-3xl sm:text-4xl font-bold text-white mb-6 text-center">
      Sobre el proyecto
    </h2>
    <div class="space-y-4 text-white/90 leading-relaxed text-lg">
      @for (abt of about(); track $index) {
        <p>{{ abt }}</p>
      }
    </div>
  </div>
</section>
