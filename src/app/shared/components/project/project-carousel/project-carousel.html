<section class="relative w-full px-4 sm:px-8 lg:px-16 max-w-6xl mx-auto pb-24 sm:pb-32 overflow-hidden">
  <floating-shapes [count]="4" [discreet]="true" />

  <div
    class="relative flex items-center justify-center"
    (touchstart)="onTouchStart($event)"
    (touchend)="onTouchEnd($event)"
  >
    <button
      (click)="goToPrevious()"
      class="flex absolute left-0 z-10 w-8 h-8 sm:w-10 sm:h-10 md:w-12 md:h-12 items-center justify-center rounded-full bg-neutral-800/80 text-white/80 hover:bg-neutral-700/90 hover:text-white transition-all duration-300 backdrop-blur-sm border border-neutral-700/50 -translate-x-1/2"
      [attr.aria-label]="'Imagen anterior'"
    >
      <lucide-icon [img]="ChevronLeft" class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6" />
    </button>

    <div class="w-full overflow-hidden">
      <div
        #track
        class="flex"
        style="will-change: transform; touch-action: pan-y;"
      >
        @for (image of images(); track image.src) {
          <div class="w-full flex-shrink-0 flex flex-col">
            <div class="min-h-[48px] flex items-center justify-center px-4 overflow-hidden">
              <p class="text-sm sm:text-base text-white/70 text-center leading-snug">
                {{ image.description }}
              </p>
            </div>
            <div
              class="relative w-full aspect-video flex items-center justify-center p-2 rounded-xl border border-neutral-800">
              <img
                [ngSrc]="image.src"
                [alt]="image.alt"
                class="w-full h-full object-contain rounded-md"
                loading="lazy"
                fill
              />
            </div>
          </div>
        }
      </div>
    </div>

    <button
      (click)="goToNext()"
      class="flex absolute right-0 z-10 w-8 h-8 sm:w-10 sm:h-10 md:w-12 md:h-12 items-center justify-center rounded-full bg-neutral-800/80 text-white/80 hover:bg-neutral-700/90 hover:text-white transition-all duration-300 backdrop-blur-sm border border-neutral-700/50 translate-x-1/2"
      [attr.aria-label]="'Siguiente imagen'"
    >
      <lucide-icon [img]="ChevronRight" class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6" />
    </button>
  </div>

  <div class="flex justify-center items-center gap-2 mt-4">
    @for (_ of images(); track $index) {
      <button
        (click)="goToSlide($index)"
        class="h-2 rounded-full transition-all duration-300"
        [class]="currentIndex() === $index ? 'bg-white w-6' : 'bg-white/30 w-2 hover:bg-white/50'"
        [attr.aria-label]="'Ir a imagen ' + ($index + 1)"
      ></button>
    }
  </div>
</section>
