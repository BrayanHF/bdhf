<section class="w-full px-4 sm:px-8 lg:px-16 pb-24 sm:pb-32">
  <div class="max-w-3xl mx-auto text-center">
    <div class="rounded-2xl border border-neutral-800 bg-neutral-950/60 p-8 sm:p-12">
      <h2 class="text-xl sm:text-2xl font-bold text-white mb-3">
        ¿Te interesa el código?
      </h2>
      <p class="text-sm sm:text-base text-white/50 mb-6 max-w-lg mx-auto">
        Puedes explorarlo en GitHub.
      </p>
      @for (href of hrefs(); track $index) {
        <a
          [href]="href.url"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex m-4 items-center gap-3 px-6 py-3 rounded-full bg-white text-black font-medium text-sm hover:bg-neutral-200 transition-colors duration-300"
        >
          <div class="h-8 w-8">
            <img [src]="href.localIcon" alt="LinkedIn" />
          </div>
          {{ href.label }}
        </a>
      }
    </div>
  </div>
</section>
