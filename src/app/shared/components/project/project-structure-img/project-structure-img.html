<section class="relative w-full px-4 sm:px-8 lg:px-16 pb-24 sm:pb-32 overflow-hidden">
  <floating-shapes [count]="4" [discreet]="true" />

  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-6 sm:mb-8">
      <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-white mb-2">
        {{ label() }}
      </h2>
    </div>

    <div class="w-full mx-auto">
      <div class="relative overflow-hidden rounded-2xl">
        <picture class="relative block w-full">
          <source [srcset]="imgNoFormat() + '.webp'" type="image/webp" />
          <img
            [src]="imgNoFormat() + '.png'"
            [alt]="label()"
            class="w-full h-auto object-contain"
            loading="lazy"
          />
        </picture>
      </div>
    </div>
  </div>
</section>
