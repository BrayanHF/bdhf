<section class="relative w-full px-4 sm:px-8 lg:px-16 pb-24 sm:pb-32 overflow-hidden">
  <floating-shape top="6%" left="3%" [size]="16" shape="circle" color="white" [opacity]="0.12" [blur]="5" [animRange]="10" [animRotationRange]="8" [animDurationMin]="6" [animDurationMax]="10" />
  <floating-shape top="20%" right="4%" [size]="10" shape="rounded" color="#d4d4d4" [opacity]="0.1" [rotation]="-25" [animRange]="8" [animRotationRange]="6" [animDurationMin]="7" [animDurationMax]="12" [animDelay]="0.8" />
  <floating-shape bottom="10%" left="5%" [size]="12" shape="square" color="#737373" [opacity]="0.1" [rotation]="40" [animRange]="7" [animRotationRange]="5" [animDurationMin]="8" [animDurationMax]="13" [animDelay]="1.5" />
  <floating-shape bottom="18%" right="3%" [size]="14" shape="circle" color="white" [opacity]="0.1" [blur]="6" [animRange]="9" [animRotationRange]="7" [animDurationMin]="6" [animDurationMax]="11" [animDelay]="2.2" />

  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-6 sm:mb-8">
      <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-white mb-2">
        {{ label() }}
      </h2>
    </div>

    <div class="w-full mx-auto">
      <div class="relative overflow-hidden rounded-2xl">
        <picture class="relative block w-full">
          <source [srcset]="imgNoFormat() + '.webp'" type="image/webp" />
          <img
            [src]="imgNoFormat() + '.png'"
            [alt]="label()"
            class="w-full h-auto object-contain"
            loading="lazy"
          />
        </picture>
      </div>
    </div>
  </div>
</section>
