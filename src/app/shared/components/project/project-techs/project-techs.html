<section class="relative w-full px-4 sm:px-8 lg:px-16 pb-16 sm:pb-24 overflow-hidden">
  <floating-shape top="4%" right="3%" [size]="14" shape="circle" color="white" [opacity]="0.15" [blur]="5" [animRange]="10" [animRotationRange]="8" [animDurationMin]="6" [animDurationMax]="10" />
  <floating-shape top="18%" left="4%" [size]="10" shape="rounded" color="#d4d4d4" [opacity]="0.12" [rotation]="25" [animRange]="8" [animRotationRange]="6" [animDurationMin]="7" [animDurationMax]="12" [animDelay]="0.5" />
  <floating-shape top="35%" right="6%" [size]="8" shape="square" color="#737373" [opacity]="0.1" [rotation]="-15" [animRange]="6" [animRotationRange]="5" [animDurationMin]="8" [animDurationMax]="14" [animDelay]="1.2" />
  <floating-shape top="50%" left="3%" [size]="12" shape="circle" color="white" [opacity]="0.12" [blur]="4" [animRange]="9" [animRotationRange]="7" [animDurationMin]="6" [animDurationMax]="11" [animDelay]="2" />
  <floating-shape top="68%" right="4%" [size]="10" shape="rounded" color="#d4d4d4" [opacity]="0.1" [rotation]="40" [animRange]="7" [animRotationRange]="6" [animDurationMin]="7" [animDurationMax]="13" [animDelay]="0.8" />
  <floating-shape top="82%" left="5%" [size]="8" shape="circle" color="#737373" [opacity]="0.1" [blur]="3" [animRange]="6" [animRotationRange]="5" [animDurationMin]="8" [animDurationMax]="12" [animDelay]="1.5" />
  <floating-shape bottom="6%" right="5%" [size]="11" shape="rounded" color="white" [opacity]="0.12" [rotation]="20" [animRange]="8" [animRotationRange]="6" [animDurationMin]="7" [animDurationMax]="11" [animDelay]="2.5" />
  <floating-shape bottom="14%" left="6%" [size]="9" shape="square" color="#d4d4d4" [opacity]="0.1" [rotation]="-30" [animRange]="7" [animRotationRange]="5" [animDurationMin]="8" [animDurationMax]="13" [animDelay]="3" />

  <div class="max-w-4xl mx-auto">
    <h2 class="text-2xl sm:text-3xl font-bold text-white mb-8 text-center">
      Tecnologías utilizadas
    </h2>

    <div class="space-y-10">
      @for (category of techCategories(); track category.title) {
        <div>
          <h3 class="text-lg sm:text-xl font-semibold text-white/90 mb-4 pl-2 border-l-2 border-white/20">
            {{ category.title }}
          </h3>
          <div class="space-y-3">
            @for (tech of category.techs; track $index) {
              <div class="flex items-start gap-4 p-4 rounded-xl border border-neutral-800 bg-neutral-950/30">
                <div class="shrink-0 flex items-center justify-center rounded-lg ">
                  <img [alt]="tech.name" [src]="tech.localImage" class="w-10 h-10 object-contain" />
                </div>
                <div>
                  <h4 class="text-xl text-white/90 font-semibold text-white mb-1">{{ tech.name }}</h4>
                  <p class="text-lg text-white/80 leading-relaxed">{{ tech.description }}</p>
                </div>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
