<section class="w-full px-4 sm:px-8 lg:px-16 pb-16 sm:pb-24">
  <div class="max-w-4xl mx-auto">
    <h2 class="text-2xl sm:text-3xl font-bold text-white mb-8 text-center">
      Tecnologías utilizadas
    </h2>

    <div class="space-y-10">
      @for (category of techCategories(); track category.title) {
        <div>
          <h3 class="text-lg sm:text-xl font-semibold text-white/80 mb-4 pl-2 border-l-2 border-white/20">
            {{ category.title }}
          </h3>
          <div class="space-y-3">
            @for (tech of category.techs; track $index) {
              <div class="flex items-start gap-4 p-4 rounded-xl border border-neutral-800 bg-neutral-950/40">
                <div class="w-10 h-10 shrink-0 flex items-center justify-center rounded-lg bg-white/5">
                  <img [src]="tech.localImage" [alt]="tech.name" class="w-6 h-6 object-contain" />
                </div>
                <div class="min-w-0">
                  <h4 class="text-sm font-semibold text-white mb-1">{{ tech.name }}</h4>
                  <p class="text-sm text-white/50 leading-relaxed">{{ tech.description }}</p>
                </div>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
