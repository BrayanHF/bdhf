<section class="relative w-full pt-12 sm:pt-16 pb-16 overflow-hidden">
  <floating-shape top="15%" left="6%" [size]="12" shape="circle" color="white" [opacity]="0.15" [blur]="6" [animRange]="10" [animRotationRange]="8" [animDurationMin]="6" [animDurationMax]="10" />
  <floating-shape bottom="20%" right="5%" [size]="14" shape="rounded" color="#d4d4d4" [opacity]="0.12" [rotation]="15" [animRange]="8" [animRotationRange]="6" [animDurationMin]="7" [animDurationMax]="12" [animDelay]="1.5" />

  <div class="relative z-10 text-center px-6">
    <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-bold tracking-tight">
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-white via-neutral-200 to-neutral-400">
          {{ title() }}
        </span>
    </h1>
    <p class="mt-4 text-base sm:text-lg text-white/40 max-w-xl mx-auto">
      {{ subtitle() }}
    </p>
  </div>
</section>
